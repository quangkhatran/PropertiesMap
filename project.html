<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Project Detail</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    padding-top:70px;
    margin:0;
    font-family:Inter;
    background:#0b0f14;
    color:white;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
}

.logo {
    font-family:'Playfair Display';
    font-size:20px;
    letter-spacing:2px;
    color:white;
    text-decoration:none;
}

.nav-links a {
    color:#ccc;
    text-decoration:none;
    margin-left:20px;
}

.nav-links a:hover {
    color:#00ffd5;
}

/* HERO */
.hero {
    height:60vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:end;
    padding:40px;
}

.hero h1 {
    font-family:'Playfair Display';
    font-size:40px;
}

/* SECTION */
.section { padding:40px; }

/* GALLERY */
.gallery {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:20px;
}

.gallery img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover { transform:scale(1.03); }

/* MAP */
#detail-map {
    width:100%;
    height:400px;
    margin-top:40px;
    border-radius:16px;
    overflow:hidden;
}

/* NEARBY CARD */
.place-card {
    background:#111;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.2s;
}

.place-card:hover {
    border:1px solid #00ffd5;
    transform:translateY(-2px);
}

.img-row {
    display:flex;
    gap:6px;
    margin-bottom:10px;
}

.img-row img {
    width:33.33%;
    height:100px;
    object-fit:cover;
    border-radius:10px;
}

/* VIEWER */
.viewer {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.viewer img {
    max-width:100%;
    max-height:90vh;
    border-radius:12px;
}

.viewer-content { position:relative; }

.nav {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.5);
    border-radius:50%;
    font-size:26px;
    color:white;
    cursor:pointer;
}

.prev { left:20px; }
.next { right:20px; }

/* BACK */
.back-btn {
    position:fixed;
    top:90px;
    left:20px;
    background:rgba(0,0,0,0.6);
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    z-index:11000;
}

/* CONTACT */
.contact-floating {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    padding:10px 14px;
    border-radius:16px;
    background:rgba(15,20,25,0.85);
    backdrop-filter:blur(12px);
}

.contact-avatar {
    width:34px;
    height:34px;
    border-radius:50%;
    background:#00ffd5;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>

</head>

<body>

<div class="navbar">
    <a href="index.html" class="logo">KHA TRAN</a>
    <div class="nav-links">
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="back-btn">← Back</div>

<div id="project"></div>

<h3 style="margin-top:30px;">Nearby Places</h3>
<div id="nearby-list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="data.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const project = assets.find(p => p.id === id);
const el = document.getElementById("project");

if(project){
    el.innerHTML = `
    <div class="hero" style="background-image:url('${project.images?.[0]}')">
        <h1>${project.name}</h1>
    </div>

    <div class="section">
        <p>Type: ${project.type}</p>
        <p>Address: ${project.address || ""}</p>

        <div id="detail-map"></div>

        <h3>Gallery</h3>
        <div class="gallery">
            ${(project.images || []).map(img => `<img src="${img}">`).join("")}
        </div>
    </div>
    `;
}

/* ===== IMAGE ===== */
function getPlaceImages(p){
    const photos = p.photos || [];

    let imgs = photos.slice(0,3).map(ph =>
        `http://localhost:3000/api/photo?ref=${ph.photo_reference}`
    );

    while(imgs.length < 3){
        imgs.push("https://via.placeholder.com/400x250?text=No+Image");
    }

    return imgs;
}

/* ===== NEARBY ===== */
async function loadNearby(lat,lng,map){
    const res = await fetch(`http://localhost:3000/api/nearby?lat=${lat}&lng=${lng}`);
    const data = await res.json();

    const container = document.getElementById("nearby-list");

    data.results.slice(0,10).forEach(p=>{
        const imgs = getPlaceImages(p);

        container.innerHTML += `
        <div class="place-card">
            <div class="img-row">
                ${imgs.map(img=>`<img src="${img}">`).join("")}
            </div>
            <b>${p.name}</b>
        </div>`;
    });
}

/* ===== MAP ===== */
function initMap(){
    if(!project) return;

    const map = L.map('detail-map').setView([project.lat, project.lng], 14);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    L.marker([project.lat, project.lng]).addTo(map);

    loadNearby(project.lat, project.lng, map);
}

initMap();
</script>

</body>
</html>
