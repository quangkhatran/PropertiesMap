<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Project Detail</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
.logo {
    font-family: 'Playfair Display';
    font-size: 20px;
    letter-spacing: 2px;
    color: white;
    text-decoration: none;
}

body {
    padding-top: 70px;
    margin:0;
    font-family:Inter;
    background:#0b0f14;
    color:white;
}

.hero {
    height:60vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:end;
    padding:40px;
}

.hero h1 {
    font-family:'Playfair Display';
    font-size:40px;
}

.section {
    padding:40px;
}

.gallery {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:20px;
}

.gallery img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover {
    transform:scale(1.03);
}

/* MAP */
#detail-map {
    width:100%;
    height:400px;
    margin-top:40px;
    border-radius:16px;
    overflow:hidden;
}

.price-marker {
    transform: translate(-50%, -100%);
}

.marker-box {
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
    color:black;
}

/* VIEWER */
.viewer {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.viewer img {
    max-width:100%;
    max-height:90vh;
    border-radius:12px;
}

.close {
    position:absolute;
    top:-40px;
    right:0;
    font-size:30px;
    cursor:pointer;
    color:white;
}



.prev { left:10px; }
.next { right:10px; }

.back-btn {
    position: fixed;
    top: 90px;
    left: 20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: white;
    z-index: 11000;
}

.legend {
    background: rgba(15,20,25,0.9);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12px;
    color: #ddd;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.legend b {
    display:block;
    margin-bottom:6px;
    color:white;
}

.legend div {
    display:flex;
    align-items:center;
    margin-bottom:5px;
}

.legend span {
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.contact-floating {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    align-items: center;
    gap: 10px;

    padding: 10px 14px;
    border-radius: 16px;

    background: rgba(15,20,25,0.85);
    backdrop-filter: blur(12px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.5);

    z-index: 99999;
    transition: all 0.25s ease;
}

/* avatar */
.contact-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #00ffd5;
    color: black;
    font-weight: 600;
    font-size: 13px;

    display: flex;
    align-items: center;
    justify-content: center;
}

/* info */
.contact-info {
    font-size: 12px;
    line-height: 1.2;
}

.contact-info .name {
    font-weight: 500;
}

.contact-info .phone {
    color: #aaa;
}

.contact-info .email {
    color: #aaa;
}
/* buttons */
.actions {
    display: flex;
    gap: 6px;
}

.btn {
    padding: 6px 10px;
    border-radius: 8px;
    background: #00ffd5;
    color: white;
    text-decoration: none;
    font-size: 12px;
}

.btn.call {
    background: #00FF00;
    color: black;
}

.viewer {
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.viewer img {
    max-width:100%;
    max-height:90vh;
    border-radius:12px;
    transition: transform 0.2s ease;
    touch-action: none;
}

.navbar {
    display:flex;
    justify-content:space-between; /* 🔥 FIX */
    align-items:center;
    padding:0 40px;
}

.nav-links a {
    color:#ccc;
    text-decoration:none;
    margin-left:20px;
}

.nav-links a:hover {
    color:#00ffd5;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="index.html" class="logo">KHA TRAN</a>

    <div class="nav-links">
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="back-btn">← Back</div>

<div id="project"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const project = assets.find(p => p.id === id);
const el = document.getElementById("project");

function getColor(type){
    switch(type){
        case "Office": return "#3b82f6";
        case "Villa": return "#22c55e";
        case "Hotel": return "#facc15";
        case "Apartments": return "#a855f7";
        default: return "#9ca3af";
    }
}

// ===== DISTANCE =====
function getDistance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI/180;
    const dLon = (lon2 - lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1 * Math.PI/180) *
        Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

if(project){
    el.innerHTML = `
    <div class="hero" style="background-image:url('${project.images?.[0]}')">
        <h1>${project.name}</h1>
    </div>

    <div class="section">
        <p>Type: ${project.type}</p>
        <p>Address: ${project.address || ""}</p>
        <p>Price: ${project.price} ${project.priceUnit}</p>
        ${project.isForRent ? `<p style="color:#00ffd5">Rent: ${project.rent} ${project.rentUnit}</p>` : ""}

        <div id="detail-map"></div>

        <h3 style="margin-top:30px">Gallery</h3>

        <div class="gallery">
            ${(project.images || []).map(img => `
                <img src="${img}">
            `).join("")}
        </div>
    </div>
    `;

    initGallery();
    initDetailMap(project);
} else {
    el.innerHTML = "<p>Project not found</p>";
}

async function loadNearbyPlaces(lat, lng, map){

    const query = `
    [out:json];
    (
      node["amenity"="restaurant"](around:800,${lat},${lng});
      node["amenity"="cafe"](around:800,${lat},${lng});
      node["amenity"="school"](around:800,${lat},${lng});
      node["shop"="supermarket"](around:800,${lat},${lng});
      node["amenity"="hospital"](around:800,${lat},${lng});
    );
    out;
    `;

    const url = "https://overpass.kumi.systems/api/interpreter?data=" + encodeURIComponent(query);

    try {
        const res = await fetch(url);
        const data = await res.json();

        console.log("POI:", data);

        data.elements.forEach(p => {

            let iconHtml = "📍"; // default

            if(p.tags.amenity === "restaurant") iconHtml = "🍽";
            if(p.tags.amenity === "cafe") iconHtml = "☕";
            if(p.tags.amenity === "school") iconHtml = "🏫";
            if(p.tags.shop === "supermarket") iconHtml = "🛒";
            if(p.tags.amenity === "hospital") iconHtml = "🏥";

            let bg = "#111";

            if(p.tags.amenity === "restaurant") bg = "#f97316";
            if(p.tags.amenity === "cafe") bg = "#a855f7";
            if(p.tags.amenity === "school") bg = "#22c55e";
            if(p.tags.shop === "supermarket") bg = "#3b82f6";
            if(p.tags.amenity === "hospital") bg = "#ef4444";

            const icon = L.divIcon({
                className: "",
                html: `<div style="
                    font-size:14px;
                    background:${bg};
                    padding:6px;
                    border-radius:50%;
                    color:white;
                    transform: translate(-50%, -50%);
                ">${iconHtml}</div>`
            });

            L.marker([p.lat, p.lon], {icon})
                .addTo(map)
                .bindPopup(p.tags.name || "Unknown");
        });

    } catch(e){
        console.error("POI error:", e);
    }
}

// ===== MAP =====
function initDetailMap(project){
    if(!project.lat || !project.lng) return;

    const map = L.map('detail-map', {
        zoomControl: true,
        scrollWheelZoom: true,
        touchZoom: true,
        doubleClickZoom: true
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {attribution: '&copy; OpenStreetMap & Carto'}).addTo(map);

    map.setView([project.lat, project.lng], 14);

    loadNearbyPlaces(project.lat, project.lng, map);

    // ===== MAIN PROJECT =====
    const mainIcon = L.divIcon({
        className:"price-marker",
        html:`<div class="marker-box" style="
            background:${getColor(project.type)};
            font-weight:700;
            border:2px solid white;
            box-shadow:0 8px 25px rgba(0,0,0,0.6);
        ">${project.price} ${project.priceUnit}</div>`,
        iconAnchor:[40,40]
    });

    L.marker([project.lat, project.lng], {icon: mainIcon})
        .addTo(map)
        .bindPopup("<b>" + project.name + "</b>")
        .openPopup();

    // ===== DISTANCE FUNCTION =====
    function getDistance(lat1, lon1, lat2, lon2){
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI/180;
        const dLon = (lon2 - lon1) * Math.PI/180;

        const a =
            Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) *
            Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLon/2)**2;

        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ===== NEARBY =====
    const radius = 500; // km

    assets.forEach(a=>{
        if(a.id === project.id) return;
        if(!a.lat || !a.lng) return;

        const dist = getDistance(project.lat, project.lng, a.lat, a.lng);
        
        if(dist <= radius){
            const color = getColor(a.type);
            const icon = L.divIcon({
                className:"price-marker",
                html:`<div style="
                        padding:5px 8px;
                        border-radius:16px;
                        font-size:11px;
                        background:${color};
                        color:black;
                        opacity:0.75;
                        box-shadow:0 6px 18px rgba(0,0,0,0.4);
                    ">${a.price} ${a.priceUnit}</div>`,
                iconAnchor:[30,30]
            });

            const m = L.marker([a.lat,a.lng],{icon}).addTo(map);

            m.on("click",()=>{
                window.location.href = a.link;
            });

            m.bindPopup(`
                <b>${a.name}</b><br>
                ${a.price} ${a.priceUnit}<br>
                ${a.isForRent ? `Rent: ${a.rent} ${a.rentUnit}<br>` : ""}
                ${dist.toFixed(1)} km
            `);
        }
    });

    // ===== LEGEND =====
    const legend = L.control({ position: "bottomright" });

    legend.onAdd = function(){
        const div = L.DomUtil.create("div", "legend");

        const types = [...new Set(assets.map(a => a.type))];

        div.innerHTML = `<b>Property Types</b>`;

        types.forEach(t=>{
            div.innerHTML += `
            <div>
                <span style="background:${getColor(t)}"></span>
                ${t}
            </div>`;
        });

        return div;
    };

    legend.addTo(map);
}


// ===== GALLERY =====
function initGallery(){
    let currentIndex = 0;

    const imgs = el.querySelectorAll(".gallery img");
    const images = Array.from(imgs).map(img => img.src);

    imgs.forEach((img, index) => {
        img.addEventListener("click", () => {
            currentIndex = index;
            openViewer();
        });
    });

    function openViewer(){
        const overlay = document.createElement("div");
        overlay.className = "viewer";

        overlay.innerHTML = `
            <div class="viewer-content" style="position:relative;">
                <span class="close">×</span>

                <div class="nav prev">‹</div>
                <div class="nav next">›</div>

                <img src="${images[currentIndex]}" id="viewer-img">
            </div>
        `;

        document.body.appendChild(overlay);

        const img = overlay.querySelector("#viewer-img");
        overlay.querySelector(".next").onclick = next;
        overlay.querySelector(".prev").onclick = prev;

        let startX = 0;
        let isSwiping = false;

        let scale = 1;
        let lastScale = 1;
        let startDistance = 0;

        let lastTap = 0;

        // ===== CLEANUP =====
        function closeViewer(){
            document.removeEventListener("keydown", keyHandler);
            overlay.remove();
        }

        // ===== NAV =====
        function next(){
            currentIndex = (currentIndex + 1) % images.length;
            img.src = images[currentIndex];
            resetZoom();
        }

        function prev(){
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            img.src = images[currentIndex];
            resetZoom();
        }

        function resetZoom(){
            scale = 1;
            lastScale = 1;
            img.style.transform = "scale(1)";
        }

        // ===== KEYBOARD =====
        function keyHandler(e){
            if(e.key === "Escape") closeViewer();
            if(e.key === "ArrowRight") next();
            if(e.key === "ArrowLeft") prev();
        }
        document.addEventListener("keydown", keyHandler);

        // ===== CLICK OUTSIDE =====
        overlay.addEventListener("click",(e)=>{
            if(!e.target.closest(".viewer-content")){
                closeViewer();
            }
        });

        overlay.querySelector(".close").onclick = closeViewer;

        // ===== TOUCH START =====
        overlay.addEventListener("touchstart", (e)=>{
            if(e.touches.length === 1){
                startX = e.touches[0].clientX;
                isSwiping = true;
            }

            if(e.touches.length === 2){
                isSwiping = false;
                startDistance = getDistance(e.touches);
            }
        });

        // ===== TOUCH MOVE =====
        overlay.addEventListener("touchmove", (e)=>{
            if(e.touches.length === 2){
                const newDistance = getDistance(e.touches);
                scale = lastScale * (newDistance / startDistance);
                scale = Math.max(1, Math.min(scale, 3));

                img.style.transform = `scale(${scale})`;
            }
        });

        // ===== TOUCH END =====
        overlay.addEventListener("touchend", (e)=>{

            // 👉 SWIPE
            if(isSwiping && e.changedTouches.length === 1){
                const endX = e.changedTouches[0].clientX;
                const diff = endX - startX;

                if(Math.abs(diff) > 50){
                    if(diff < 0) next();
                    else prev();
                }
            }

            // 👉 PINCH END
            lastScale = scale;

            // 👉 DOUBLE TAP
            const now = Date.now();
            if(now - lastTap < 300){
                scale = scale > 1 ? 1 : 2;
                img.style.transform = `scale(${scale})`;
                lastScale = scale;
            }
            lastTap = now;

            isSwiping = false;
        });

        function getDistance(touches){
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx*dx + dy*dy);
        }
    }
}


// NAV
document.querySelector(".back-btn").onclick = () => {
    if(document.referrer){
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
};
</script>

    <div class="contact-avatar">KT</div>

        <div class="email">kha@email.</div>
    </div>

    <div class="actions">
        <a href="tel:0909123456" class="btn call">Call</a>
        <a href="mailto:kha@email.com" class="btn">Email</a>
    </div>
</div>

<script>
let lastScroll = 0;
const bar = document.querySelector(".contact-floating");

window.addEventListener("scroll", () => {
    const current = window.scrollY;

    if(current > lastScroll){
        bar.style.transform = "translateY(80px)";
        bar.style.opacity = "0.6";
    } else {
        bar.style.transform = "translateY(0)";
        bar.style.opacity = "1";
    }

    lastScroll = current;
});
</script>
